<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inti - Panel Inteligente (Premium)</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand: #f59e0b; /* Tu naranja distintivo */
            --bg-page: #1a1a1a; /* Fondo ultra oscuro */
            --bg-card: #2d2d2d; /* Tarjetas oscuras, elevadas */
            --text-main: #f1f1f1; /* Texto blanco principal */
            --text-sub: #a1a1a1; /* Texto gris secundario */
            --border: #3d3d3d; /* Bordes sutiles */
        }
        body { font-family: 'Outfit', sans-serif; background: var(--bg-page); margin: 0; padding-bottom: 100px; color: var(--text-main); }
        
        /* Estilos de la página */
        header { padding: 40px 20px; text-align: center; background: #111111; border-bottom: 1px solid var(--border); }
        .logo { font-size: 2.2rem; font-weight: 600; color: var(--brand); }
        header p { color: var(--text-main); }

        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        
        .card { 
            background: var(--bg-card); 
            padding: 25px; 
            border-radius: 15px; 
            border: 1px solid var(--border); 
            text-decoration: none; 
            color: inherit; 
            transition: 0.3s; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
        }
        
        .card h3 { margin-top: 0; color: var(--text-main); }
        .card p { color: var(--text-sub); }
        
        .card:hover { 
            border-color: var(--brand); 
            transform: translateY(-5px); 
            box-shadow: 0 15px 35px rgba(245,158,11,0.1); /* Efecto de brillo naranja */
        }

        /* --- VENTANA DE CHAT --- */
        #chat-widget { position: fixed; bottom: 20px; right: 20px; z-index: 1000; width: 350px; display: flex; flex-direction: column; align-items: flex-end; }
        
        #chat-button { background: var(--brand); color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-size: 24px; transition: 0.3s; }
        #chat-button:hover { transform: scale(1.1); }

        #chat-window { width: 100%; height: 450px; background: var(--bg-card); border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); display: none; flex-direction: column; overflow: hidden; margin-bottom: 15px; border: 1px solid var(--border); }
        
        .chat-header { background: var(--brand); color: white; padding: 15px; font-weight: 600; text-align: center; }
        
        #chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; font-size: 0.9rem; color: var(--text-main); }
        
        .message { padding: 10px 15px; border-radius: 15px; max-width: 80%; }
        .bot { background: var(--border); align-self: flex-start; } /* Gris para el bot */
        .user { background: var(--brand); color: white; align-self: flex-end; } /* Naranja para el usuario */
        
        .chat-input-area { display: flex; padding: 10px; border-top: 1px solid var(--border); background: #1a1a1a; }
        .chat-input-area input { flex: 1; border: none; padding: 10px; outline: none; background: transparent; color: var(--text-main); }
        .chat-input-area input::placeholder { color: var(--text-sub); }
        .chat-input-area button { background: none; border: none; color: var(--brand); font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div class="logo">inti</div>
    <p>Portal de Herramientas para Clientes</p>
</header>

<div class="container">
    <div class="card"><h3>Consultoría</h3><p>Gestión de proyectos y asesoría técnica.</p></div>
    <div class="card"><h3>Documentos</h3><p>Acceso a reportes y archivos compartidos.</p></div>
    <div class="card"><h3>Pagos</h3><p>Estado de cuenta y facturación.</p></div>
</div>

<div id="chat-widget">
    <div id="chat-window">
        <div class="chat-header">Asistente Inti</div>
        <div id="chat-messages">
            <div class="message bot">¡Hola! Soy Inti. ¿En qué puedo ayudarte hoy?</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="user-input" placeholder="Escribe un mensaje...">
            <button onclick="sendMessage()">Enviar</button>
        </div>
    </div>
    <div id="chat-button" onclick="toggleChat()">💬</div>
</div>

<script>
    function toggleChat() {
        const window = document.getElementById('chat-window');
        window.style.display = window.style.display === 'flex' ? 'none' : 'flex';
    }

    function sendMessage() {
        const input = document.getElementById('user-input');
        const container = document.getElementById('chat-messages');
        
        if (input.value.trim() !== "") {
            const userDiv = document.createElement('div');
            userDiv.className = 'message user';
            userDiv.innerText = input.value;
            container.appendChild(userDiv);

            setTimeout(() => {
                const botDiv = document.createElement('div');
                botDiv.className = 'message bot';
                botDiv.innerText = "NO SÉ LEER JAJA. Pero sé que te llamas Alim, jujuuju";
                container.appendChild(botDiv);
                container.scrollTop = container.scrollHeight;
            }, 1000);

            input.value = "";
            container.scrollTop = container.scrollHeight;
        }
    }
</script>

</body>
</html>
