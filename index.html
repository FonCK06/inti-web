<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inti - Panel Inteligente</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --brand: #f59e0b; --bg: #ffffff; --text: #1f2937; }
        body { font-family: 'Outfit', sans-serif; background: #f9fafb; margin: 0; padding-bottom: 100px; }
        
        /* Estilos de la página */
        header { padding: 40px 20px; text-align: center; background: white; border-bottom: 1px solid #f3f4f6; }
        .logo { font-size: 2.2rem; font-weight: 600; color: var(--brand); }
        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card { background: white; padding: 25px; border-radius: 15px; border: 1px solid #f3f4f6; text-decoration: none; color: inherit; transition: 0.3s; }
        .card:hover { border-color: var(--brand); transform: translateY(-5px); }

        /* --- VENTANA DE CHAT --- */
        #chat-widget { position: fixed; bottom: 20px; right: 20px; z-index: 1000; width: 350px; display: flex; flex-direction: column; align-items: flex-end; }
        
        #chat-button { background: var(--brand); color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.1); font-size: 24px; transition: 0.3s; }
        #chat-button:hover { transform: scale(1.1); }

        #chat-window { width: 100%; height: 450px; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); display: none; flex-direction: column; overflow: hidden; margin-bottom: 15px; border: 1px solid #eee; }
        .chat-header { background: var(--brand); color: white; padding: 15px; font-weight: 600; text-align: center; }
        #chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; font-size: 0.9rem; }
        .message { padding: 10px 15px; border-radius: 15px; max-width: 80%; }
        .bot { background: #f3f4f6; align-self: flex-start; }
        .user { background: var(--brand); color: white; align-self: flex-end; }
        
        .chat-input-area { display: flex; padding: 10px; border-top: 1px solid #eee; }
        .chat-input-area input { flex: 1; border: none; padding: 10px; outline: none; }
        .chat-input-area button { background: none; border: none; color: var(--brand); font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div class="logo">inti</div>
    <p>Portal de Herramientas para Clientes</p>
</header>

<div class="container">
    <div class="card"><h3>Consultoría</h3><p>Gestión de proyectos y asesoría técnica.</p></div>
    <div class="card"><h3>Documentos</h3><p>Acceso a reportes y archivos compartidos.</p></div>
    <div class="card"><h3>Pagos</h3><p>Estado de cuenta y facturación.</p></div>
</div>

<div id="chat-widget">
    <div id="chat-window">
        <div class="chat-header">Asistente Inti</div>
        <div id="chat-messages">
            <div class="message bot">¡Hola! Soy Inti. ¿En qué puedo ayudarte hoy?</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="user-input" placeholder="Escribe un mensaje...">
            <button onclick="sendMessage()">Enviar</button>
        </div>
    </div>
    <div id="chat-button" onclick="toggleChat()">💬</div>
</div>

<script>
    function toggleChat() {
        const window = document.getElementById('chat-window');
        window.style.display = window.style.display === 'flex' ? 'none' : 'flex';
    }

    function sendMessage() {
        const input = document.getElementById('user-input');
        const container = document.getElementById('chat-messages');
        
        if (input.value.trim() !== "") {
            // Mensaje del usuario
            const userDiv = document.createElement('div');
            userDiv.className = 'message user';
            userDiv.innerText = input.value;
            container.appendChild(userDiv);

            // Respuesta automática (Simulada)
            setTimeout(() => {
                const botDiv = document.createElement('div');
                botDiv.className = 'message bot';
                botDiv.innerText = "Entendido. Como soy un prototipo, aún estoy aprendiendo a responder cosas complejas, pero ya estoy configurado en tu web.";
                container.appendChild(botDiv);
                container.scrollTop = container.scrollHeight;
            }, 1000);

            input.value = "";
            container.scrollTop = container.scrollHeight;
        }
    }
</script>

</body>
</html>
